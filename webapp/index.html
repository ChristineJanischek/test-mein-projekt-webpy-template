<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notenrechner Template</title>
  <style>
    :root {
      --bg-1: #f4f1ea;
      --bg-2: #e7efe0;
      --ink: #1f2a2e;
      --primary: #176b87;
      --accent: #f9a03f;
      --ok: #2a9d8f;
      --warn: #c1121f;
      --panel: rgba(255, 255, 255, 0.9);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Source Sans 3", "Segoe UI", sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background: radial-gradient(circle at top left, var(--bg-2), var(--bg-1));
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
    }

    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border-radius: 1.25rem;
      box-shadow: var(--shadow);
      padding: 1.5rem;
      animation: slideIn .5s ease;
    }

    h1 { margin-top: 0; }
    p { margin-top: .2rem; }
    form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: .9rem;
      margin: 1rem 0;
    }
    label { font-weight: 600; display: block; margin-bottom: .25rem; }
    input {
      width: 100%;
      padding: .65rem;
      border: 1px solid #cad2c5;
      border-radius: .6rem;
      font-size: 1rem;
    }
    .actions { grid-column: span 2; display: flex; gap: .8rem; flex-wrap: wrap; }
    button {
      border: 0;
      background: var(--primary);
      color: #fff;
      padding: .72rem 1rem;
      border-radius: .7rem;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: #4d5c61; }
    .result, .history {
      border-radius: .8rem;
      padding: .9rem;
      background: #fff;
      margin-top: 1rem;
      border: 1px solid #e8ecef;
    }
    .warn { color: var(--warn); font-weight: 700; }
    .ok { color: var(--ok); font-weight: 700; }
    .error { color: var(--warn); }
    ul { margin: .4rem 0 .2rem 1.1rem; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 720px) {
      form { grid-template-columns: 1fr; }
      .actions { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Notenrechner</h1>
    <p>Legacy-Funktion modernisiert: API-basiert, dokumentiert und persistent.</p>

    <form id="grade-form">
      <div>
        <label for="bwl">BWL</label>
        <input id="bwl" name="bwl" type="number" min="1" max="6" step="0.1" required />
      </div>
      <div>
        <label for="mathe">Mathe</label>
        <input id="mathe" name="mathe" type="number" min="1" max="6" step="0.1" required />
      </div>
      <div>
        <label for="deutsch">Deutsch</label>
        <input id="deutsch" name="deutsch" type="number" min="1" max="6" step="0.1" required />
      </div>
      <div>
        <label for="englisch">Englisch</label>
        <input id="englisch" name="englisch" type="number" min="1" max="6" step="0.1" required />
      </div>
      <div class="actions">
        <button type="submit">Berechnen</button>
        <button type="button" class="secondary" id="load-history">Historie laden</button>
      </div>
    </form>

    <section class="result" id="result" hidden></section>
    <section class="history" id="history" hidden></section>
    <p class="error" id="error"></p>
  </main>

  <script>
    const API_BASE = window.location.origin.replace(":8000", ":5000");
    const form = document.getElementById("grade-form");
    const resultEl = document.getElementById("result");
    const historyEl = document.getElementById("history");
    const errorEl = document.getElementById("error");

    function setError(message) {
      errorEl.textContent = message || "";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("");
      const data = Object.fromEntries(new FormData(form).entries());
      for (const key of Object.keys(data)) {
        data[key] = Number(data[key]);
      }

      try {
        const response = await fetch(`${API_BASE}/api/v1/grades/evaluate`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (!response.ok) {
          throw new Error("Die Anfrage konnte nicht verarbeitet werden.");
        }

        const payload = await response.json();
        const subjects = payload.tutoring_subjects.length > 0
          ? payload.tutoring_subjects.join(", ")
          : "Keine";

        resultEl.hidden = false;
        resultEl.innerHTML = `
          <h2>Ergebnis</h2>
          <p><strong>Durchschnitt:</strong> ${payload.average.toFixed(2)}</p>
          <p class="${payload.needs_tutoring ? "warn" : "ok"}">
            <strong>Nachhilfe:</strong> ${subjects}
          </p>
        `;
      } catch (error) {
        setError(error.message || "Unbekannter Fehler");
      }
    });

    document.getElementById("load-history").addEventListener("click", async () => {
      setError("");
      try {
        const response = await fetch(`${API_BASE}/api/v1/grades/evaluations?limit=10`);
        if (!response.ok) {
          throw new Error("Historie konnte nicht geladen werden.");
        }

        const entries = await response.json();
        historyEl.hidden = false;
        historyEl.innerHTML = "<h2>Letzte Bewertungen</h2>";

        if (entries.length === 0) {
          historyEl.innerHTML += "<p>Noch keine Einträge vorhanden.</p>";
          return;
        }

        const list = document.createElement("ul");
        for (const entry of entries) {
          const item = document.createElement("li");
          const subjects = entry.tutoring_subjects.length > 0
            ? entry.tutoring_subjects.join(", ")
            : "Keine";
          item.textContent = `${entry.created_at}: Ø ${entry.average.toFixed(2)}, Nachhilfe: ${subjects}`;
          list.appendChild(item);
        }

        historyEl.appendChild(list);
      } catch (error) {
        setError(error.message || "Unbekannter Fehler");
      }
    });
  </script>
</body>
</html>
