services:
  mysql:
    image: mysql:8.4
    container_name: webpy-template-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  python-api:
    build:
      context: .
      dockerfile: docker/python-api.Dockerfile
    container_name: webpy-template-api
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: appuser
      DB_PASSWORD: apppassword
      DB_NAME: appdb
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy

  web:
    image: nginx:1.27-alpine
    container_name: webpy-template-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./webapp:/usr/share/nginx/html:ro
    depends_on:
      - python-api

volumes:
  mysql-data:
